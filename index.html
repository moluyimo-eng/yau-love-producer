<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>丘成桐版恋与制作人</title>
<style>
  :root {
    --gold: #c9a96e; --gold-light: #e0c78a;
    --pink: #e8919c; --pink-light: #f5c6ce;
    --blue: #6b8cce; --white: #f0ece4;
    --dialogue-bg: rgba(20, 24, 40, 0.95);
    --choice-bg: rgba(201, 169, 110, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0f1a;
    font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Noto Sans SC',sans-serif;
    min-height: 100vh; display: flex; justify-content: center; align-items: center;
    padding: 16px;
    background-image:
      radial-gradient(ellipse at 50% 30%, rgba(201,169,110,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 80%, rgba(232,145,156,0.05) 0%, transparent 50%);
  }

  /* ---- Phone Frame ---- */
  .phone {
    width: 420px; max-width: 100%; height: 86vh; max-height: 820px; min-height: 640px;
    border-radius: 24px; overflow: hidden; position: relative;
    box-shadow: 0 0 0 3px #2a2a3a, 0 0 0 6px #1a1a28, 0 0 0 8px #333348, 0 20px 60px rgba(0,0,0,0.5);
    display: flex; flex-direction: column;
  }

  /* ---- Scene Backgrounds ---- */
  .scene {
    flex: 1; position: relative; overflow: hidden; transition: background 1.2s ease;
  }
  .scene.library {
    background: linear-gradient(180deg, #2c1810 0%, #3d2417 35%, #1a0f0a 100%);
  }
  .scene.library .bg-layer {
    position: absolute; inset: 0; pointer-events: none;
    background:
      repeating-linear-gradient(90deg, transparent, transparent 42px, rgba(255,255,255,0.02) 42px, rgba(255,255,255,0.02) 44px),
      radial-gradient(ellipse at 70% 25%, rgba(255,200,120,0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 30% 65%, rgba(255,160,80,0.05) 0%, transparent 40%);
  }
  .scene.lecture {
    background: linear-gradient(180deg, #151d33 0%, #1c2748 40%, #111929 100%);
  }
  .scene.lecture .bg-layer {
    position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 55% 30%, rgba(100,140,210,0.1) 0%, transparent 55%),
      radial-gradient(ellipse at 70% 70%, rgba(80,120,200,0.04) 0%, transparent 40%);
  }
  .scene.lecture .bg-chalkboard {
    position: absolute; top: 8%; left: 5%; right: 5%; height: 55%;
    background: rgba(20,30,20,0.3);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 4px;
    pointer-events: none;
  }
  .scene.cafe {
    background: linear-gradient(180deg, #3d2015 0%, #4a2a1a 45%, #2a1510 100%);
  }
  .scene.cafe .bg-layer {
    position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 50% 35%, rgba(255,180,100,0.15) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 75%, rgba(255,140,70,0.06) 0%, transparent 40%);
  }
  .scene.cafe .bg-window {
    position: absolute; top: 10%; right: 10%; width: 35%; height: 40%;
    background: linear-gradient(180deg, rgba(255,200,150,0.08), rgba(255,150,100,0.04));
    border-radius: 8px; border: 1px solid rgba(255,255,255,0.04);
    pointer-events: none;
  }
  .scene.dream {
    background: linear-gradient(180deg, #0a0a1a 0%, #121830 50%, #1a1025 100%);
  }
  .scene.dream .bg-layer {
    position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 40% 25%, rgba(180,150,220,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 60%, rgba(140,180,220,0.06) 0%, transparent 50%);
  }

  /* ---- Floating Math Particles ---- */
  .particles {
    position: absolute; inset: 0; pointer-events: none; overflow: hidden;
  }
  .particle {
    position: absolute;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    opacity: 0;
    animation: floatUp 8s infinite;
    color: rgba(201,169,110,0.15);
  }
  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.12; }
    90% { opacity: 0.08; }
    100% { transform: translateY(-400px) rotate(40deg); opacity: 0; }
  }

  /* ---- Character Area ---- */
  .character-area {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 55%; height: 70%; display: flex; align-items: flex-end; justify-content: center;
    pointer-events: none; transition: all 0.6s ease;
  }
  .character-area svg {
    max-height: 100%; max-width: 100%;
    filter: drop-shadow(0 0 24px rgba(0,0,0,0.5));
    transition: all 0.5s ease;
    opacity: 0; transform: translateY(30px);
  }
  .character-area.show svg {
    opacity: 1; transform: translateY(0);
  }

  /* ---- Name Tag ---- */
  .name-tag {
    position: absolute; top: 16px; left: 20px;
    background: rgba(0,0,0,0.55); border: 1px solid var(--gold);
    padding: 5px 14px; border-radius: 16px;
    color: var(--gold-light); font-size: 0.78em; letter-spacing: 2px;
    pointer-events: none; opacity: 0; transition: opacity 0.4s; z-index: 5;
  }
  .name-tag.show { opacity: 1; }

  /* ---- Math formula decorative overlay ---- */
  .formula-overlay {
    position: absolute; top: 12%; left: 10%;
    font-family: 'Courier New', monospace;
    font-size: 13px; color: rgba(201,169,110,0.12); letter-spacing: 1px;
    pointer-events: none; z-index: 2;
    transition: opacity 0.6s;
  }
  .formula-overlay.line2 { top: auto; bottom: 18%; left: auto; right: 8%; }

  /* ---- Dialogue Box ---- */
  .dialogue-area {
    background: var(--dialogue-bg);
    border-top: 1px solid rgba(201,169,110,0.2);
    padding: 16px 20px 12px; min-height: 130px;
    position: relative; backdrop-filter: blur(10px);
  }
  .speaker-name {
    color: var(--gold); font-size: 0.78em; font-weight: bold;
    letter-spacing: 2px; margin-bottom: 6px;
  }
  .speaker-name.narrator { color: #999; }
  .dialogue-text {
    color: var(--white); font-size: 0.93em; line-height: 1.8; min-height: 3.6em;
  }
  .typing-cursor::after { content: '|'; animation: blink 1s infinite; color: var(--gold); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .skip-btn {
    position: absolute; bottom: 8px; right: 16px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.4); font-family: inherit; font-size: 0.7em;
    padding: 3px 10px; border-radius: 10px; cursor: pointer;
    transition: all 0.2s; display: none; letter-spacing: 1px;
  }
  .skip-btn:hover { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.3); }
  .skip-btn.show { display: block; }

  /* ---- Choices ---- */
  .choices-overlay {
    background: rgba(10,10,20,0.96); padding: 14px 18px;
    border-top: 1px solid rgba(232,145,156,0.2);
    display: flex; flex-direction: column; gap: 7px;
    backdrop-filter: blur(10px);
  }
  .choice-btn {
    background: var(--choice-bg); border: 1px solid rgba(201,169,110,0.2);
    color: #d4c5a9; padding: 11px 14px; font-size: 0.88em;
    cursor: pointer; text-align: left; border-radius: 8px;
    transition: all 0.25s; font-family: inherit;
    display: flex; align-items: center; gap: 10px;
  }
  .choice-btn:hover {
    background: rgba(201,169,110,0.18); border-color: var(--gold);
    color: var(--gold-light); box-shadow: 0 0 12px rgba(201,169,110,0.12);
  }
  .choice-btn:active { background: rgba(201,169,110,0.25); transform: scale(0.98); }
  .choice-btn .num {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--gold); display: flex;
    align-items: center; justify-content: center; font-size: 0.75em; flex-shrink: 0;
    color: var(--gold-light);
  }

  .math-btn {
    background: rgba(107,140,206,0.08); border: 1px solid rgba(107,140,206,0.25);
    color: #b0c4e8; padding: 11px 14px; font-size: 0.88em;
    cursor: pointer; text-align: left; border-radius: 8px;
    transition: all 0.25s; font-family: inherit;
    display: flex; align-items: center; gap: 10px;
  }
  .math-btn:hover {
    background: rgba(107,140,206,0.18); border-color: var(--blue);
    color: #c8d6f0; box-shadow: 0 0 12px rgba(107,140,206,0.1);
  }
  .math-btn .num {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--blue); display: flex;
    align-items: center; justify-content: center; font-size: 0.75em; flex-shrink: 0;
  }

  /* ---- Result pop ---- */
  .result-pop {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 1.3em; font-weight: bold; padding: 12px 28px; border-radius: 12px;
    z-index: 500; pointer-events: none;
    animation: popIn 0.35s ease, popOut 0.35s 1.3s ease forwards;
  }
  .result-pop.ok { background: rgba(0,200,100,0.12); color: #5f5; border: 1px solid rgba(0,200,100,0.3); }
  .result-pop.no { background: rgba(255,80,80,0.12); color: #f77; border: 1px solid rgba(255,80,80,0.3); }
  @keyframes popIn { from{opacity:0;transform:translate(-50%,-50%) scale(0.7)} to{opacity:1;transform:translate(-50%,-50%) scale(1)} }
  @keyframes popOut { from{opacity:1} to{opacity:0} }

  /* ---- Status ---- */
  .status-bar {
    position: absolute; top: 14px; right: 18px; display: flex; gap: 12px;
    font-size: 0.68em; color: rgba(255,255,255,0.45); z-index: 50; pointer-events: none;
    background: rgba(0,0,0,0.35); padding: 4px 12px; border-radius: 10px;
  }
  .status-bar span { color: var(--pink); }
  .pikachu-mascot { display: inline-block; width: 28px; height: 28px; margin-left: 4px; vertical-align: middle; animation: pikabounce 1.5s ease-in-out infinite; }
  .pikachu-mascot.shock { animation: pikashock 0.3s ease-out; }
  @keyframes pikabounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }
  @keyframes pikashock {
    0% { transform: scale(1); }
    30% { transform: scale(1.3) rotate(5deg); }
    60% { transform: scale(1.2) rotate(-3deg); }
    100% { transform: scale(1); }
  }

  /* ---- Share Panel ---- */
  #share-panel {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.93); z-index: 1000;
    flex-direction: column; justify-content: center; align-items: center; gap: 16px;
  }
  #share-panel.show { display: flex; }
  #share-panel img { max-width: 92vw; max-height: 55vh; border-radius: 10px; box-shadow: 0 4px 40px rgba(0,0,0,0.6); }
  #share-panel .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  #share-panel button, #share-panel .btn-zh {
    padding: 11px 20px; border-radius: 22px; font-size: 0.85em;
    cursor: pointer; font-family: inherit; text-decoration: none;
    transition: all 0.2s; border: 1px solid;
  }
  .btn-dl { background: rgba(201,169,110,0.1); color: var(--gold); border-color: var(--gold); }
  .btn-dl:hover { background: rgba(201,169,110,0.25); }
  .btn-cp { background: rgba(232,145,156,0.1); color: var(--pink); border-color: var(--pink); }
  .btn-cp:hover { background: rgba(232,145,156,0.25); }
  .btn-zh { background: #06f; color: #fff; border-color: #06f; display: inline-flex; align-items: center; gap: 4px; }
  .btn-zh:hover { background: #0052cc; }
  .btn-cl { background: transparent; color: #666; border-color: #444; }
  .btn-cl:hover { color: #fff; }

  @media (max-width: 460px) {
    .phone { height: 93vh; border-radius: 0; }
    body { padding: 0; }
    .character-area { width: 70%; height: 60%; }
    .formula-overlay { display: none; }
  }

  /* ---- Fireworks ---- */
  #fireworks-canvas {
    position: fixed; inset: 0; pointer-events: none; z-index: 9999;
    opacity: 0; transition: opacity 0.5s;
  }
  #fireworks-canvas.active { opacity: 1; }
</style>
</head>
<body>

<div class="phone">
  <!-- Scene -->
  <div class="scene library" id="scene">
    <div class="bg-layer"></div>
    <!-- Chalkboard (lecture only) -->
    <div class="bg-chalkboard" id="chalkboard" style="display:none"></div>
    <!-- Window (cafe only) -->
    <div class="bg-window" id="cafe-window" style="display:none"></div>
    <!-- Floating particles -->
    <div class="particles" id="particles"></div>
    <!-- Math formula overlay -->
    <div class="formula-overlay" id="formula1">∂g/∂t = -2Ric</div>
    <div class="formula-overlay line2" id="formula2">c₁(X) = 0</div>
    <!-- Status -->
    <div class="status-bar">
      好感 <span id="aff-val">0</span> &nbsp;|&nbsp; 数学 <span id="math-val">0/0</span>
      <span class="pikachu-mascot" id="pikachu-mascot"></span>
    </div>
    <!-- Name tag -->
    <div class="name-tag" id="name-tag"></div>
    <!-- Character portrait -->
    <div class="character-area" id="character-area"></div>
  </div>

  <!-- Dialogue -->
  <div class="dialogue-area" id="dialogue-area">
    <div class="speaker-name" id="speaker"></div>
    <div class="dialogue-text" id="dialogue-text"></div>
    <button class="skip-btn" id="skip-btn" onclick="skipTyping()" title="跳过动画">跳过 ▸▸</button>
  </div>

  <!-- Choices -->
  <div class="choices-overlay" id="choices" style="display:none"></div>
</div>

<!-- Share panel -->
<div id="share-panel">
  <img id="share-img" src="" alt="分享卡片">
  <div class="btn-row">
    <button class="btn-dl" onclick="downloadShare()">下载图片</button>
    <button class="btn-cp" onclick="copyShareText()">复制文案</button>
    <a class="btn-zh" href="#" onclick="goZhihu();return false">去知乎发想法</a>
    <button class="btn-cl" onclick="closeShare()">关闭</button>
  </div>
</div>
<canvas id="share-canvas" width="800" height="500" style="display:none"></canvas>
<canvas id="fireworks-canvas"></canvas>

function updateStatus() {
  $affVal.textContent = affection;
  $mathVal.textContent = mathCorrect + '/' + mathTotal;
}

function setBG(name) {
  $scene.className = 'scene ' + (name || 'library');
  // Show/hide room props
  $chalkboard.style.display = name === 'lecture' ? 'block' : 'none';
  $cafeWindow.style.display = name === 'cafe' ? 'block' : 'none';
  // Update formula deco
  const formulas = {
    library: ['χ = V - E + F', 'c₁(X) = 0'],
    lecture: ['∂g/∂t = -2Ric', 'Ric(ω) = λω'],
    cafe: ['dim H¹,¹ = 1', '∫ c₁ ∧ ω^{n-1}'],
    dream: ['R_{μν} = 0', 'SU(3) holonomy'],
  };
  const f = formulas[name] || formulas.library;
  $formula1.textContent = f[0];
  $formula2.textContent = f[1];
  // Refresh particles
  spawnParticles();
}

function setPortrait(show, mood) {
  if (show) {
    $charArea.innerHTML = (mood === 'sad') ? YAU_SVG_SAD : YAU_SVG;
    $charArea.classList.add('show');
  } else {
    $charArea.innerHTML = NO_PORTRAIT_SVG;
    $charArea.classList.add('show');
  }
}

function setSpeaker(name) {
  if (name) {
    $speaker.textContent = name;
    $speaker.className = 'speaker-name';
    $nameTag.textContent = name;
    $nameTag.classList.add('show');
  } else {
    $speaker.textContent = '';
    $speaker.className = 'speaker-name narrator';
    $nameTag.classList.remove('show');
  }
}

let skipFlag = false;
function skipTyping() { skipFlag = true; }

async function typeText(text, el) {
  skipFlag = false;
  const skipBtn = document.getElementById('skip-btn');
  el.textContent = '';
  el.classList.add('typing-cursor');
  skipBtn.classList.add('show');
  for (let i = 0; i < text.length; i++) {
    if (skipFlag) {
      el.textContent = text;
      break;
    }
    el.textContent += text[i];
    await sleep(text[i] === '\n' ? 150 : 45);
  }
  el.classList.remove('typing-cursor');
  skipBtn.classList.remove('show');
  skipFlag = false;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function showChoicesDOM(choices) {
  $choices.innerHTML = '';
  $choices.style.display = 'flex';
  choices.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="num">${i + 1}</span>${ch.text}`;
    btn.addEventListener('click', () => handleChoice(ch));
    $choices.appendChild(btn);
  });
  awaitingInput = true;
}

function showMathDOM(problem, passScene, failScene) {
  $choices.innerHTML = '';
  $choices.style.display = 'flex';
  problem.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'math-btn';
    btn.innerHTML = `<span class="num">${'ABCD'[i]}</span>${opt}`;
    btn.addEventListener('click', () => {
      mathTotal++;
      if (i === problem.ans) {
        mathCorrect++; affection += 5; updateStatus();
        flashPop(true);
        handleScene(passScene);
      } else {
        affection -= 5; updateStatus();
        shockPikachu();
        flashPop(false);
        $choices.style.display = 'none';
        $dialogue.textContent = '❌ 不对。' + (problem.hint || '');
        sleep(1500).then(() => handleScene(failScene));
      }
    });
    $choices.appendChild(btn);
  });
  awaitingInput = true;
}

function flashPop(ok) {
  const el = document.createElement('div');
  el.className = 'result-pop ' + (ok ? 'ok' : 'no');
  el.textContent = ok ? '✅ 正确！ +5' : '❌ 错误！ -5';
  document.querySelector('.phone').appendChild(el);
  setTimeout(() => el.remove(), 1700);
}

// ---- FIREWORKS ----
let fireworksRunning = false;
function launchFireworks() {
  const canvas = document.getElementById('fireworks-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.classList.add('active');
  const ctx = canvas.getContext('2d');

  const particles = [];
  const colors = ['#ffd700','#ff6b9d','#ff4444','#44ff88','#6b8cce','#ff9f43','#ff66cc','#00ffcc'];

  function burst(x, y) {
    const count = 40 + Math.random() * 30;
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 6;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.008 + Math.random() * 0.02,
        color: colors[Math.floor(Math.random() * colors.length)],
        size: 2 + Math.random() * 3,
      });
    }
  }

  function frame() {
    if (!fireworksRunning) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Random bursts
    if (Math.random() < 0.15) {
      burst(
        canvas.width * 0.2 + Math.random() * canvas.width * 0.6,
        canvas.height * 0.1 + Math.random() * canvas.height * 0.5
      );
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.04; // gravity
      p.life -= p.decay;

      if (p.life <= 0) { particles.splice(i, 1); continue; }

      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(frame);
  }

  fireworksRunning = true;
  frame();
  setTimeout(() => {
    fireworksRunning = false;
    canvas.classList.remove('active');
  }, 5000);
}

function showEndingButtons() {

// ============================
// GAME LOGIC
// ============================

async function handleChoice(ch) {
  if (!awaitingInput) return;
  awaitingInput = false;
  $choices.style.display = 'none';
  if (ch.aff) {
    if (ch.aff < 0) shockPikachu();
    affection += ch.aff;
    if (affection > 100) affection = 100;
    if (affection < 0) affection = 0;
    updateStatus();
  }
  history.push({ scene: currentScene, choice: ch.text });
  await handleScene(ch.next);
}

async function handleScene(sceneId) {
  currentScene = sceneId;
  const s = scenes[sceneId];
  if (!s) return console.error('Missing:', sceneId);

  if (s.bg) setBG(s.bg);
  if (s.portrait !== undefined) {
    const isFail = /_(no|joke|disappointed)$/.test(currentScene);
    setPortrait(s.portrait, isFail ? 'sad' : 'normal');
  }
  setSpeaker(s.speaker || '');

  // Math problem
  if (s.math !== undefined) {
    await typeText(s.text, $dialogue);
    showMathDOM(pickMath(s.math), s.pass, s.fail);
    return;
  }

  // Auto (ending bridge)
  if (s.auto) {
    const lines = [
      '═══════════════════════════',
      '  故事暂告一段落...',
      '  正在计算你的结局...',
      '',
      `  ❤ 最终好感度: ${affection}`,
      `  📐 数学成绩: ${mathCorrect} / ${mathTotal}`,
      '═══════════════════════════',
    ];
    setBG('dream'); setPortrait(false); setSpeaker('');
    await typeText(lines.join('\n'), $dialogue);
    await sleep(1000);
    determineEnding();
    return;
  }

  // Ending scene
  if (s.ending) {
    $choices.style.display = 'none';
    showEndingButtons();
    const ed = getEndingData();
    window._currentEnding = ed;
    if (ed.name === '卡拉比-丘之约') launchFireworks();
    return;
  }

  // Normal scene
  if (s.text) await typeText(s.text, $dialogue);

  if (s.choices && s.choices.length > 0) {
    showChoicesDOM(s.choices);
  } else if (s.next) {
    await sleep(700);
    await handleScene(s.next);
  }
}

function determineEnding() {
  // 2×3 matrix: math(academic) × affection(romance)
  // Top row: 3/3 perfect math. Bottom row: 0-2 correct.
  if (mathCorrect === 3) {
    if (affection >= 65) resolvedEnding = 'ending_calabi_yau';
    else if (affection >= 35) resolvedEnding = 'ending_scholar';
    else resolvedEnding = 'ending_dream';
  } else {
    if (affection >= 65) resolvedEnding = 'ending_breakup';
    else if (affection >= 35) resolvedEnding = 'ending_almost';
    else resolvedEnding = 'ending_quit';
  }
  handleScene(resolvedEnding);
}

function generateShareCard() {
  const ending = window._currentEnding || getEndingData();
  const canvas = document.getElementById('share-canvas');
  const ctx = canvas.getContext('2d');

  // BG gradient
  const bg = ctx.createLinearGradient(0, 0, 800, 500);
  bg.addColorStop(0, '#1a1525'); bg.addColorStop(0.5, '#1c2748'); bg.addColorStop(1, '#0f0f1a');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, 800, 500);

  // Decorative math formulas
  ctx.font = '13px "Courier New",monospace';
  ctx.fillStyle = 'rgba(201,169,110,0.06)';
  const deco = ['∂g/∂t=-2Ric','c₁(X)=0','χ=V-E+F','Ric(ω)=0','dimH¹,¹=1','R_{μν}=0','(M,ω)Kähler','SU(3)','∧*T*X','Ω^{p,q}'];
  for (let i = 0; i < 30; i++) {
    ctx.fillText(deco[i % deco.length], Math.random() * 750, Math.random() * 480);
  }

  // Outer decorative border
  ctx.strokeStyle = 'rgba(201,169,110,0.15)'; ctx.lineWidth = 3;
  ctx.strokeRect(15, 15, 770, 470);
  ctx.strokeStyle = 'rgba(201,169,110,0.3)'; ctx.lineWidth = 1.5;
  ctx.strokeRect(22, 22, 756, 456);

  // Corner ornaments
  const corners = [[30,30],[770,30],[30,470],[770,470]];
  corners.forEach(([x, y]) => {
    const dx = x === 30 ? 1 : -1;
    const dy = y === 30 ? 1 : -1;
    ctx.strokeStyle = 'rgba(201,169,110,0.4)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, y + 20*dy); ctx.lineTo(x, y); ctx.lineTo(x + 20*dx, y); ctx.stroke();
  });

  // Title
  ctx.fillStyle = '#c9a96e'; ctx.font = 'bold 28px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif';
  ctx.textAlign = 'center'; ctx.fillText('丘成桐版恋与制作人', 400, 75);

  ctx.fillStyle = 'rgba(201,169,110,0.5)'; ctx.font = '13px "Courier New",monospace';
  ctx.fillText('YAU LOVE PRODUCER', 400, 100);

  // Gold divider with diamond
  ctx.strokeStyle = 'rgba(201,169,110,0.5)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(120, 118); ctx.lineTo(380, 118); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(420, 118); ctx.lineTo(680, 118); ctx.stroke();
  // Diamond
  ctx.fillStyle = '#c9a96e';
  ctx.beginPath(); ctx.moveTo(400, 110); ctx.lineTo(406, 118); ctx.lineTo(400, 126); ctx.lineTo(394, 118); ctx.closePath(); ctx.fill();

  // Stats (compact 2-line)
  const left = 200;
  ctx.textAlign = 'right';
  ctx.fillStyle = '#888'; ctx.font = '15px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif';
  ctx.fillText('好感度', left, 160);
  ctx.fillText('数学', left, 185);

  ctx.textAlign = 'left';
  ctx.fillStyle = '#e8919c'; ctx.font = 'bold 17px "Courier New",monospace';
  ctx.fillText(affection + ' / 100', left + 12, 160);
  const barW = 120, barX = left + 12;
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(barX, 164, barW, 5);
  ctx.fillStyle = '#e8919c';
  ctx.fillRect(barX, 164, barW * affection / 100, 5);

  ctx.fillStyle = '#6b8cce'; ctx.font = 'bold 17px "Courier New",monospace';
  ctx.fillText(mathCorrect + ' / ' + mathTotal + (mathTotal > 0 ? '  (' + Math.round(mathCorrect/mathTotal*100) + '%)' : ''), left + 12, 185);

  // Ending name badge
  const badgeColors = {
    '卡拉比-丘之约': ['#c9a96e', '💍'],
    '学术之路': ['#6b8cce', '📚'],
    '数学劝退': ['#999', '💻'],
    '黄粱一梦': ['#b496c9', '💫'],
    '火速分手': ['#e8433d', '💔'],
    '恋爱未满': ['#e8a87c', '💛'],
  };
  const badge = badgeColors[ending.name] || badgeColors['黄粱一梦'];
  ctx.fillStyle = badge[0]; ctx.font = 'bold 18px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(badge[1] + ' ' + ending.name, 400, 220);

  // Divider
  ctx.strokeStyle = 'rgba(201,169,110,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(100, 240); ctx.lineTo(700, 240); ctx.stroke();

  // Summary — the main content
  ctx.fillStyle = '#d4c5a9'; ctx.font = '15px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif';
  ctx.textAlign = 'left';
  const summary = ending.summary || '';
  const maxW = 640;
  const words = summary.split('');
  let line = '', y = 268, lineH = 26, x0 = 80;
  for (let i = 0; i < words.length; i++) {
    const test = line + words[i];
    if (ctx.measureText(test).width > maxW && line.length > 0) {
      ctx.fillText(line, x0, y);
      line = words[i];
      y += lineH;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x0, y);
  y += lineH + 8;

  // Quote
  ctx.fillStyle = 'rgba(201,169,110,0.7)'; ctx.font = 'italic 14px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif';
  ctx.textAlign = 'center';
  const q = '—— "' + ending.quote + '"';
  if (ctx.measureText(q).width > 640) {
    const mid = Math.floor(q.length / 2);
    let split = mid;
    for (const sep of ['，', '、', '；']) {
      const idx = q.indexOf(sep, mid - 6);
      if (idx > 0 && idx < mid + 6) { split = idx + 1; break; }
    }
    ctx.fillText(q.substring(0, split), 400, y);
    ctx.fillText(q.substring(split), 400, y + 22);
    y += 22;
  } else {
    ctx.fillText(q, 400, y);
  }

  // Footer
  ctx.fillStyle = '#666'; ctx.font = '11px "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif';
  ctx.fillText('发布于 知乎 · #丘成桐版恋与制作人 · #Let\'s学习杯打卡挑战赛', 400, 430);
  ctx.fillStyle = '#444'; ctx.font = '10px monospace';
  ctx.fillText('yau-love-producer v2.0 · made with ❤️ + vibe coding', 400, 460);

  document.getElementById('share-img').src = canvas.toDataURL('image/png');
  document.getElementById('share-panel').classList.add('show');
}

function resetGame() {

  currentScene = 'start';
  document.getElementById('share-panel').classList.remove('show');
  $choices.style.display = 'none'; updateStatus();
  handleScene('start');
}

// ---- Keyboard ----
document.addEventListener('keydown', e => {
  // Space/Enter to skip typing
  if ((e.key === ' ' || e.key === 'Enter') && !awaitingInput) {
    e.preventDefault();
    skipTyping();
    return;
  }
  if (!awaitingInput) return;
  if (e.key >= '1' && e.key <= '4') {
    const btns = $choices.querySelectorAll('.choice-btn');
    if (btns[parseInt(e.key) - 1]) btns[parseInt(e.key) - 1].click();
  }
  if (e.key >= 'a' && e.key <= 'd') {
    const btns = $choices.querySelectorAll('.math-btn');
    if (btns[e.key.charCodeAt(0) - 97]) btns[e.key.charCodeAt(0) - 97].click();
  }
  if (e.key === 's' || e.key === 'S') {
    const b = Array.from($choices.querySelectorAll('.choice-btn')).find(b => b.textContent.includes('分享'));
    if (b) b.click();
  }
  if (e.key === 'r' || e.key === 'R') {
    const b = Array.from($choices.querySelectorAll('.choice-btn')).find(b => b.textContent.includes('重新开始'));
    if (b) b.click();
  }
});

// Click dialogue area to skip
document.getElementById('dialogue-area').addEventListener('click', (e) => {
  if (e.target.id === 'skip-btn') return;
  skipTyping();
});
